services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: rased-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"          # accès local depuis Compass ou mongosh
    volumes:
      - mongo_data:/data/db    # données persistantes entre redémarrages
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend FastAPI ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rased-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env                   # MONGO_URI, GEMINI_API_KEY, etc. viennent du .env
    environment:
      CORS_ORIGINS: "*"
      # MONGO_URI est lu depuis .env — ne pas le surcharger ici
      # pour Atlas, mettre mongodb+srv://... dans .env
    depends_on:
      mongo:
        condition: service_healthy   # ignoré si mongo n'est pas dans le compose

volumes:
  mongo_data:
    driver: local
